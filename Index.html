<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seguro de Vida - Pagamento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f1f5f9;
    margin: 0;
}

.header {
    background: #cc092f;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 18px;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

.container {
    max-width: 400px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
}

.valor {
    font-size: 30px;
    color: #cc092f;
    font-weight: bold;
}

.status {
    margin-top: 10px;
    font-weight: bold;
}

.timer {
    color: red;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #cc092f;
    color: white;
    cursor: pointer;
}

textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">Seguro de Vida</div>

<!-- CLIENTE -->
<div class="container" id="cliente">

    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Bradesco_logo.png" class="logo">

    <h3>Plano de Seguro de Vida</h3>

    <div class="valor" id="valor">R$ 0,00</div>
    <p id="descricao">Proteção para você e sua família</p>

    <div id="qr"></div>

    <button onclick="copiar()">Copiar código PIX</button>

    <textarea id="codigoPix" readonly></textarea>

    <button onclick="abrirBanco()">Abrir no app do banco</button>

    <div class="status" id="status">Aguardando pagamento</div>
    <div class="timer" id="timer"></div>
</div>

<!-- LOGIN -->
<div class="container hidden" id="login">
    <h2>Admin</h2>
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button>
</div>

<!-- ADMIN -->
<div class="container hidden" id="admin">
    <h2>Nova Cobrança</h2>

    <input type="number" id="valorInput" placeholder="Valor">
    <input type="text" id="descInput" placeholder="Descrição">
    <input type="text" id="codigoInput" placeholder="Código PIX">

    <button onclick="gerar()">Gerar Link</button>

    <p id="linkGerado"></p>
</div>

<script>
const SENHA = "153319";

// detectar /admin
if (window.location.pathname === "/admin") {
    document.getElementById("cliente").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
}

// login
function login() {
    let senha = document.getElementById("senha").value;

    if (senha === SENHA) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("admin").classList.remove("hidden");
    } else {
        alert("Senha incorreta");
    }
}

// formatar valor
function formatar(valor) {
    return Number(valor).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
    });
}

// gerar link universal
function gerar() {
    let valor = document.getElementById("valorInput").value;
    let desc = document.getElementById("descInput").value;
    let codigo = document.getElementById("codigoInput").value;

    if (!valor || !codigo) {
        alert("Preencha valor e código!");
        return;
    }

    let link = window.location.origin +
        `/?valor=${encodeURIComponent(valor)}&desc=${encodeURIComponent(desc)}&pix=${encodeURIComponent(codigo)}`;

    document.getElementById("linkGerado").innerText = link;
}

// copiar
function copiar() {
    navigator.clipboard.writeText(window.codigoPix);
    alert("Código PIX copiado!");
}

// abrir banco
function abrirBanco() {
    if (!window.codigoPix) return;

    window.location.href = "pix://" + window.codigoPix;

    setTimeout(() => {
        alert("Se não abrir, copie o código PIX e pague no seu banco.");
    }, 1500);
}

// carregar dados
function carregar() {
    let params = new URLSearchParams(window.location.search);

    let valor = params.get("valor");
    let desc = params.get("desc");
    let codigo = params.get("pix");

    if (!valor || !codigo) {
        document.getElementById("descricao").innerText = "Cobrança inválida";
        return;
    }

    document.getElementById("valor").innerText = formatar(valor);
    document.getElementById("descricao").innerText = desc;

    window.codigoPix = codigo;

    document.getElementById("codigoPix").value = codigo;

    new QRCode(document.getElementById("qr"), {
        text: codigo,
        width: 200,
        height: 200
    });

    iniciarTimer();
}

// timer
function iniciarTimer() {
    let tempoTotal = 15 * 60;
    let inicio = Date.now();

    let intervalo = setInterval(() => {
        let diff = Math.floor((Date.now() - inicio) / 1000);
        let restante = tempoTotal - diff;

        if (restante <= 0) {
            clearInterval(intervalo);
            document.getElementById("status").innerText = "Expirado";
            document.getElementById("timer").innerText = "";
            return;
        }

        let min = Math.floor(restante / 60);
        let seg = restante % 60;

        document.getElementById("timer").innerText =
            `Expira em ${min}:${seg.toString().padStart(2,'0')}`;
    }, 1000);
}

carregar();
</script>

</body>
</html>
